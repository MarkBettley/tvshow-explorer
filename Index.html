<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Shows Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <header>
        <h1>📺 TV Shows Explorer</h1>
        <p>Descubre información de tus series favoritas</p>
    </header>

    <main>
        <!-- Sección de búsqueda -->
        <section class="search-section">
            <h2>Buscar series</h2>
            <form id="searchForm">
                <input type="text" id="searchInput" placeholder="Ej: Breaking Bad, Game of Thrones..." required>
                <button type="submit">Buscar</button>
            </form>
            <div id="searchResults" class="results-grid"></div>
        </section>

        <!-- Sección de series populares -->
        <section class="popular-section">
            <h2>Series destacadas</h2>
            <div id="popularShows" class="results-grid"></div>
        </section>
    </main>

    <footer>
        <p>Datos proporcionados por <a href="https://www.tvmaze.com/" target="_blank">TVmaze</a></p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
